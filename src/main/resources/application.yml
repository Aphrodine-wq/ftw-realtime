server:
  port: ${PORT:4000}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ftw_realtime_dev}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${POOL_SIZE:10}

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    validate-on-migrate: false
    locations: classpath:db/migration

  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${SECRET_KEY_BASE:dev-secret-key-change-in-production}
    ttl-seconds: 86400
    issuer: ftw-realtime
    audience: ftw

  cors:
    allowed-origins:
      - http://localhost:3000
      - https://fairtradeworker.com
      - https://www.fairtradeworker.com
      - https://fairtradeworker.vercel.app
      - https://*.vercel.app

  storage:
    bucket: ${STORAGE_BUCKET:}
    region: ${AWS_REGION:us-east-1}
    endpoint: ${STORAGE_ENDPOINT:}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
    local-path: ${STORAGE_LOCAL_PATH:uploads}

  frontend-url: ${FRONTEND_URL:http://localhost:3000}

  push:
    expo-token: ${EXPO_ACCESS_TOKEN:}

  admin:
    password: ${ADMIN_PASSWORD:faircommand}

  quickbooks:
    client-id: ${QB_CLIENT_ID:}
    client-secret: ${QB_CLIENT_SECRET:}
    redirect-uri: ${QB_REDIRECT_URI:http://localhost:4000/api/quickbooks/callback}
    environment: ${QB_ENVIRONMENT:sandbox}
    base-url: ${QB_BASE_URL:https://sandbox-quickbooks.api.intuit.com}
    auth-url: https://appcenter.intuit.com/connect/oauth2
    token-url: https://oauth.platform.intuit.com/oauth2/v1/tokens/bearer
    webhook-verifier-token: ${QB_WEBHOOK_VERIFIER_TOKEN:}

  ai:
    runpod-url: ${RUNPOD_URL:}
    cost-per-inference: 0.002
