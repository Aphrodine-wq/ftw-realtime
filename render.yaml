services:
  - type: web
    name: ftw-realtime
    runtime: docker
    plan: starter
    region: oregon
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: ftw-realtime-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ftw-realtime-db
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: ftw-realtime-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ftw-realtime-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: ftw-realtime-db
          property: name
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: PORT
        value: "10000"
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # ── Email (Resend SMTP relay) ──
      # Resend → API Keys → create one. Then set SMTP_PASSWORD to the API key.
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        value: resend
      - key: SMTP_PASSWORD
        sync: false
      # ── Admin ──
      # Set this in the Render dashboard. Default is "faircommand" — DO NOT ship that.
      - key: ADMIN_PASSWORD
        sync: false
      # ── OAuth (Google + Apple Sign-In) ──
      # Google: OAuth 2.0 Web client ID from console.cloud.google.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      # Apple: Services ID from developer.apple.com (NOT the app bundle ID)
      - key: APPLE_CLIENT_ID
        sync: false
      # ── File storage (Cloudflare R2 recommended — zero egress fees) ──
      # Cloudflare R2 setup:
      #   1. Cloudflare → R2 → Create bucket "ftw-uploads"
      #   2. Manage R2 API Tokens → Create API token (Object Read & Write)
      #   3. Bucket → Settings → enable "R2.dev subdomain" for public reads
      #      OR connect a custom domain (e.g. files.fairtradeworker.com)
      - key: STORAGE_BUCKET
        sync: false  # e.g. ftw-uploads
      - key: STORAGE_ENDPOINT
        sync: false  # https://<account_id>.r2.cloudflarestorage.com
      - key: STORAGE_PUBLIC_URL
        sync: false  # https://pub-<hash>.r2.dev   OR   https://files.fairtradeworker.com
      - key: AWS_ACCESS_KEY_ID
        sync: false  # R2 API token Access Key ID
      - key: AWS_SECRET_ACCESS_KEY
        sync: false  # R2 API token Secret Access Key
      - key: AWS_REGION
        value: auto  # R2 ignores region but the SDK requires a non-empty value

databases:
  - name: ftw-realtime-db
    plan: starter
    region: oregon
    databaseName: ftw_realtime
