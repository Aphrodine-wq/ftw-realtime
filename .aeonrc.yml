# AEON Verification Config — ftw-realtime
# Phoenix WebSocket + REST backend: live bidding, chat, notifications
# Handles: real-time marketplace events, user auth, Ecto/Postgres
profile: cybersecurity
language: elixir

engines:
  # Core analysis
  symbolic_exec: true
  taint_analysis: true
  information_flow: true
  concurrency_check: true
  cross_file: true
  error_handling: true
  # Security Tier 1
  api_security: true
  auth_access_control: true
  injection_advanced: true
  input_validation: true
  insecure_randomness: true
  data_exposure: true
  session_jwt: true
  # Security Tier 2
  business_logic: true
  race_condition_security: true
  secret_detection: true
  security_misconfig: true
  ssrf_advanced: true

severity: warning

include:
  - "lib/**/*.ex"
  - "config/**/*.exs"

exclude:
  - "deps/**"
  - "_build/**"
  - "priv/static/**"
  - "assets/**"
  - "test/**"

custom_taint_sources:
  - "params"
  - "attrs"
  - "socket.assigns"
  - "conn.params"
  - "conn.body_params"
  - "conn.query_params"
  - "System.get_env"
  - "Jason.decode"

custom_taint_sinks:
  - "Repo.insert"
  - "Repo.update"
  - "Repo.delete"
  - "Repo.query"
  - "Ecto.Adapters.SQL.query"
  - "PubSub.broadcast"
  - "push"
  - "System.cmd"
  - "Code.eval_string"

parallel: true
baseline: .aeon-baseline.json
