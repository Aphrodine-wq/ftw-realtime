services:
  - type: web
    name: ftw-realtime
    runtime: docker
    plan: starter
    region: oregon
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ftw-realtime-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: PORT
        value: "10000"
      - key: SPRING_PROFILES_ACTIVE
        value: prod

databases:
  - name: ftw-realtime-db
    plan: starter
    region: oregon
    databaseName: ftw_realtime
